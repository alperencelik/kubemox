kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Grafana (kube-prometheus-stack)
      - containerPort: 30300
        hostPort: 30300
        protocol: TCP
      # Prometheus (kube-prometheus-stack)
      - containerPort: 30900
        hostPort: 30900
        protocol: TCP

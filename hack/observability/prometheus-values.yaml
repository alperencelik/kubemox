# Minimal kube-prometheus-stack values for local development.
# Disables heavy components not needed for operator metrics testing.

crds:
  enabled: true

alertmanager:
  enabled: false

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false

grafana:
  enabled: true
  adminPassword: admin
  image:
    tag: "12.4.2"
  service:
    type: NodePort
    nodePort: 30300
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
  additionalDataSources:
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.tracing.svc.cluster.local:3200
      jsonData:
        httpMethod: GET
        tracesToMetrics:
          datasourceUid: prometheus
        serviceMap:
          datasourceUid: prometheus

prometheus:
  service:
    type: NodePort
    nodePort: 30900
  prometheusSpec:
    # Scrape ALL ServiceMonitors regardless of labels or namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    retention: 1h
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
